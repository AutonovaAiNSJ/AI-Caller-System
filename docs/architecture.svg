<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">AI Caller System Architecture</title>
  <desc id="desc">White-label AI calling architecture showing telephony, LiveKit, AI agent, Gemini Live, dashboard, and integrations.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.5; }
      .primary { fill: #eef2ff; stroke: #7c3aed; }
      .accent { fill: #ecfdf5; stroke: #00b894; }
      .warn { fill: #fffbeb; stroke: #f59e0b; }
      .dark { fill: #0b1120; }
      .title { font: 700 26px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 17px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 13px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; }
      .white { fill: #ffffff; }
      .line { stroke: #94a3b8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .line2 { stroke: #7c3aed; stroke-width: 2.2; fill: none; marker-end: url(#arrowPurple); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect class="bg" width="1120" height="720"/>
  <text x="56" y="58" class="title">AI Caller System Architecture</text>
  <text x="56" y="84" class="small">White-label tenant dashboard, LiveKit voice agents, Gemini Live, and booking integrations</text>

  <rect x="56" y="130" width="190" height="74" rx="16" class="card" filter="url(#shadow)"/>
  <text x="88" y="162" class="label">Caller / Lead</text>
  <text x="88" y="184" class="small">Phone or browser simulation</text>

  <rect x="314" y="130" width="190" height="74" rx="16" class="card" filter="url(#shadow)"/>
  <text x="350" y="162" class="label">SIP / Telephony</text>
  <text x="350" y="184" class="small">Provider trunk + dialing</text>

  <rect x="572" y="130" width="190" height="74" rx="16" class="primary" filter="url(#shadow)"/>
  <text x="623" y="162" class="label">LiveKit</text>
  <text x="608" y="184" class="small">Rooms, SIP, dispatch</text>

  <rect x="830" y="130" width="220" height="74" rx="16" class="dark" filter="url(#shadow)"/>
  <text x="888" y="162" class="label white">AI Agent</text>
  <text x="872" y="184" class="small white">agent.py / inbound.py</text>

  <path d="M246 167 H314" class="line"/>
  <path d="M504 167 H572" class="line"/>
  <path d="M762 167 H830" class="line2"/>

  <rect x="830" y="270" width="220" height="74" rx="16" class="primary" filter="url(#shadow)"/>
  <text x="878" y="302" class="label">Gemini Live</text>
  <text x="870" y="324" class="small">Realtime voice model</text>
  <path d="M940 204 V270" class="line2"/>

  <rect x="56" y="420" width="210" height="78" rx="16" class="card" filter="url(#shadow)"/>
  <text x="98" y="452" class="label">Admin Dashboard</text>
  <text x="92" y="474" class="small">Tenant UI + Super Admin</text>

  <rect x="330" y="420" width="190" height="78" rx="16" class="accent" filter="url(#shadow)"/>
  <text x="384" y="452" class="label">Supabase</text>
  <text x="362" y="474" class="small">Auth, data, settings</text>

  <rect x="570" y="420" width="190" height="78" rx="16" class="card" filter="url(#shadow)"/>
  <text x="612" y="452" class="label">Google Calendar</text>
  <text x="612" y="474" class="small">Availability + events</text>

  <rect x="810" y="420" width="190" height="78" rx="16" class="card" filter="url(#shadow)"/>
  <text x="860" y="452" class="label">SMTP Email</text>
  <text x="852" y="474" class="small">Booking confirmations</text>

  <rect x="330" y="560" width="190" height="78" rx="16" class="card" filter="url(#shadow)"/>
  <text x="384" y="592" class="label">SMS Provider</text>
  <text x="384" y="614" class="small">Twilio when configured</text>

  <rect x="570" y="560" width="190" height="78" rx="16" class="warn" filter="url(#shadow)"/>
  <text x="622" y="592" class="label">Campaigns</text>
  <text x="606" y="614" class="small">APScheduler dispatch</text>

  <path d="M830 188 C695 255 520 335 425 420" class="line"/>
  <path d="M830 188 C755 270 675 340 665 420" class="line"/>
  <path d="M930 204 C932 300 922 365 905 420" class="line"/>
  <path d="M830 188 C735 365 530 500 425 560" class="line"/>
  <path d="M830 188 C805 350 720 485 665 560" class="line"/>
  <path d="M266 459 H330" class="line"/>

  <rect x="56" y="650" width="994" height="34" rx="10" fill="#eef2ff" stroke="#dbe3ef"/>
  <text x="76" y="672" class="small">Tenant-scoped settings, prompts, profiles, transcripts, appointments, campaigns, and integration keys flow through FastAPI + Supabase helpers.</text>
</svg>
